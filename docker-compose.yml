services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      - RAILS_ENV=${RAILS_ENV}
      - HOST_NAME=${HOST_NAME}
    command: bash -c "bin/dev"
    tty: true
    volumes:
      - .:/rails-8-vite-starter
    ports:
      - "3100:3000"
networks:
  default:
    name: rails-8-vite-starter_default